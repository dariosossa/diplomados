<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            margin-bottom: 2rem;
            font-size: 2.5rem;
            color: var(--primary);
            font-weight: 800;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 480px) {
            .menu-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .menu-item {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .icon {
            font-size: 2rem;
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mi Ruta de Aprendizaje</h1>
        
        <nav class="menu-grid">
            <a href="aprendiendoHTML.html" class="menu-item">
                <span class="icon">🌐</span>
                <span>Aprendiendo HTML</span>
            </a>
            
            <a href="aprendiendoCSS.html" class="menu-item">
                <span class="icon">🎨</span>
                <span>Aprendiendo CSS</span>
            </a>
            
            <a href="JS.html" class="menu-item">
                <span class="icon">📜</span>
                <span>JavaScript (JS)</span>
            </a>
            
            <a href="TAILWIND.html" class="menu-item">
                <span class="icon">⚡</span>
                <span>Tailwind CSS</span>
            </a>
        </nav>

        <div class="footer">
            Selecciona una sección para continuar estudiando
        </div>
    </div>

</body>
</html>
